metadata:
  id: day3_osaka_city_sushi_formal
  title: "Day 3 不去京都：木津市場＋日本橋動漫模型＋飯店酒廊下午茶＋肉NOASATSU 壽司晚餐"
  version: "V5.25.0"
  status: "active_formal_day3_planning_baseline"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

change_summary:
  previous_formal_route_v5_24: "木津市場＋京都甜點伴手禮＋寶可夢／動漫＋京 鰻和 本店午餐＋天ぷら 京星晚餐"
  new_formal_route_v5_25: "木津市場＋難波／日本橋＋動漫模型周邊採買＋飯店休息與行政酒廊下午茶＋肉NOASATSU 壽司晚餐"
  user_instruction: "晚餐吃壽司，覆蓋正式行程，並更新所需更新章節。"
  decision_effect: "Day 3 正式行程改為大阪市內版；京都版行程、京 鰻和 本店、天ぷら 京星降為備案／歷史版本，不再是 Day 3 主方案。"

formal_itinerary:
  date: "2027/11/19（五）"
  theme: "木津市場＋日本橋動漫模型＋飯店酒廊下午茶＋肉NOASATSU 壽司晚餐"
  breakfast_policy: "Day 3 不吃飯店行政酒廊早餐，保留木津市場早午餐。"
  transport_policy: "不去京都；全日以大阪市內移動為主，使用地鐵、步行與短程計程車。"
  dinner_selection:
    status: "selected_price_confirmed_from_user_screenshot"
    platform: "KKday"
    selected_product_id: 268366
    selected_product_url: "https://www.kkday.com/zh-tw/product/268366?cid=5193&ud1=DSA02&ud2=product&ud3=sa&ud4=tw&ud5=23050718592"
    unit_price_twd: 1541
    estimated_total_twd_for_two: 3082
    note: "使用者提供的 KKday 頁面顯示單人價格 NT$1,541；以兩人同行估算合計 NT$3,082。取消政策與實際訂位條件仍需再確認。"
  items:
    - time: "08:00–09:30"
      plan: "木津市場早午餐"
      location: "木津市場"
      status: "formal_fixed"
      note: "保留原本 Day 3 開頭，不吃飯店早餐。"
    - time: "09:30–10:15"
      plan: "移動到難波／日本橋"
      location: "難波、日本橋"
      status: "formal_fixed"
      note: "比去京都輕鬆很多；移動不跨城市。"
    - time: "10:15–12:30"
      plan: "日本橋動漫／模型／周邊採買"
      location: "日本橋、Den Den Town、Ota Road"
      status: "formal_fixed_pending_2027_store_hours"
      note: "主軸為動漫、模型、角色商品、周邊採買；2027 各店營業時間與活動需再次確認。"
    - time: "12:30–14:00"
      plan: "難波／道頓堀／心齋橋午餐"
      location: "難波周邊"
      status: "formal_area_lunch_candidate_needed"
      note: "可選壽司、燒肉、洋食、鰻魚或大阪在地料理；正式午餐店待選。"
    - time: "14:00–15:00"
      plan: "回飯店休息與整理戰利品"
      location: "InterContinental Osaka"
      status: "formal_fixed"
      note: "使用者指定回飯店休息和酒廊吃下午茶；本段保留移動與整理時間。"
    - time: "15:00–16:30"
      plan: "InterContinental Osaka Executive Lounge 下午茶"
      location: "InterContinental Osaka Executive Lounge"
      status: "formal_fixed_pending_hotel_2027_policy"
      note: "依飯店 2027 行政酒廊時段、資格與內容再確認。"
    - time: "16:30–18:30"
      plan: "飯店休息／梅田周邊輕鬆散步"
      location: "InterContinental Osaka、Grand Front Osaka 周邊"
      status: "formal_luxury_slow_travel_buffer"
      note: "不再安排遠距離景點，避免 Day 3 再變成長日。"
    - time: "19:00–20:30"
      plan: "肉NOASATSU 壽司晚餐"
      location: "肉NOASATSU｜KKday #268366"
      status: "formal_dinner_direction_selected_price_confirmed_from_user_screenshot"
      note: "使用者已指定此 KKday 商品作為正式壽司晚餐來源；店名為肉NOASATSU，單人 NT$1,541、兩人合計 NT$3,082。預約方式、取消政策與交通仍需再確認。"
    - time: "20:30 後"
      plan: "回飯店休息"
      location: "InterContinental Osaka"
      status: "formal_fixed"
      note: "隔天 Day 4 仍有心齋橋、行政酒廊下午茶與 NOKA Roast & Grill。"

superseded_items:
  kyoto_route:
    status: "superseded_by_v5_25"
    note: "不再作為 Day 3 正式行程；保留為歷史版本或備案。"
  kyoto_lunch:
    restaurant: "京 鰻和 本店 / 京 うな和 本店"
    status: "fallback_only"
    note: "已被大阪市內午餐候選取代。"
  kyoto_dinner:
    restaurant: "天ぷら 京星 / Tempura Kyoboshi"
    status: "fallback_only"
    note: "已被大阪市內壽司晚餐方向取代；TABLEALL Reservation Request 不再是 Day 3 主預約任務。"
  kyoto_sweets:
    shops:
      - "鶴屋吉信 IRODORI"
      - "末富"
      - "MALEBRANCHE 加加阿365祇園店"
    status: "fallback_only"
    note: "京都甜點伴手禮不再是正式 Day 3 內容；可改由大阪百貨甜點或日本橋周邊購物補足。"

  follow_up_required:
  - "確認肉NOASATSU／KKday #268366 壽司晚餐的最終價格、預約方式、取消政策與交通安排。"
  - "確認 Day 3 難波／道頓堀／心齋橋午餐候選。"
  - "確認日本橋、Den Den Town、Ota Road 2027/11/19 主要商店營業時間、活動與排隊情況。"
  - "若肉NOASATSU／KKday #268366 的實際訂位條件或總價與目前兩人 NT$3,082 估算不同，重新估算 Day 3 壽司晚餐預算。"
  - "若使用者之後想恢復京都，需重新確認京都版是否回到主方案。"
