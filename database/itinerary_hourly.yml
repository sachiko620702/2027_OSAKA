metadata:
  id: itinerary_hourly
  title: "2027 大阪自由行小時制時間表"
  version: "V5.19.0"
  status: "active_hourly_planning_baseline"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

basis:
  trip_dates: "2027/11/17（三）～2027/11/21（日）"
  hotel: "InterContinental Osaka"
  style: "Luxury Slow Travel"
  flight_baseline: "使用現行 BR178 / BR129 班表作為 2027 行程暫排基準"
  flight_caveat: "2027/11 官方班表、票價、機型與訂位狀態仍需再次確認"
  day1_lounge_preference: "Day 1 抵達飯店後希望使用 InterContinental Osaka 行政酒廊下午茶；實際可用性待飯店 2027 lounge policy 確認。"

hourly_itinerary:
  - day: "Day 1"
    date: "2027/11/17（三）"
    theme: "抵達大阪、飯店入住、行政酒廊下午茶、梅田 Pokémon Center"
    items:
      - time: "03:30–04:30"
        plan: "抵達桃園機場 TPE，辦理報到與行李託運"
        status: "planning_baseline"
        note: "依 BR178 06:30 起飛暫排；實際報到時間依航空公司規定。"
      - time: "06:30–10:10"
        plan: "EVA Air BR178｜TPE → KIX"
        status: "use_current_timetable"
        note: "採用目前班表作為規劃基準；2027 官方班表仍需確認。"
      - time: "10:10–12:00"
        plan: "入境、領行李、會合 KKday 機場接送"
        status: "planning_baseline"
        note: "入境耗時依現場人流調整。"
      - time: "12:00–13:30"
        plan: "KIX → InterContinental Osaka"
        status: "selected_transport_pending_price"
        note: "使用 KKday #129909；價格與接送規則待確認。"
      - time: "13:30–14:30"
        plan: "飯店寄放行李／入住手續／短暫休息"
        status: "planning_baseline"
        note: "是否可提早入住、入住日是否可使用行政酒廊，依飯店 2027 政策與當日狀況。"
      - time: "15:00–16:30"
        plan: "InterContinental Osaka Executive Lounge 下午茶"
        status: "preferred_target_pending_hotel_policy"
        note: "使用者希望第一天用到下午茶；需確認 2027 下午茶時段、使用資格、入住日前後 lounge access 與內容。"
      - time: "16:45–18:30"
        plan: "梅田 Pokémon Center OSAKA"
        status: "fixed_stop_pending_hours"
        note: "下午茶後前往；2027/11/17 營業時間、入場規則與限定商品待確認。"
      - time: "18:30–20:00"
        plan: "晚餐待確認"
        status: "candidate_needed"
        note: "已安排下午茶，晚餐建議保留彈性，可選梅田或飯店周邊輕鬆用餐。"
      - time: "20:00 後"
        plan: "回飯店休息"
        status: "planning_baseline"
        note: "隔天 USJ，建議早休息。"
  - day: "Day 2"
    date: "2027/11/18（四）"
    theme: "USJ 一日遊"
    items:
      - time: "07:00–08:00"
        plan: "InterContinental Osaka 行政酒廊早餐"
        status: "pending_hotel_2027_policy"
        note: "需確認 2027 lounge access 與早餐時段。"
      - time: "08:00–09:00"
        plan: "飯店 → Universal Studios Japan"
        status: "selected_transport_pending_price"
        note: "使用 KKday #536220；實際 pickup time 與價格待確認。"
      - time: "09:00–12:00"
        plan: "USJ 上午攻略"
        status: "pending_official_announcement"
        note: "Studio Pass、Express Pass、VIP、整理券與 Super Nintendo World 規則待官方公布。"
      - time: "12:00–13:00"
        plan: "園區午餐"
        status: "pending_candidate"
        note: "依 2027 園區餐廳與活動調整。"
      - time: "13:00–17:00"
        plan: "USJ 下午設施與園區購物"
        status: "pending_official_announcement"
        note: "是否安排 Donkey Kong Country 依 2027 規則。"
      - time: "17:00–19:30"
        plan: "晚餐／夜間活動"
        status: "pending_official_announcement"
        note: "依營業時間與體力決定是否留到夜間。"
      - time: "19:30–20:30"
        plan: "USJ → InterContinental Osaka"
        status: "selected_transport_pending_price"
        note: "使用 KKday #536220 回程。"
      - time: "20:30 後"
        plan: "飯店休息"
        status: "planning_baseline"
        note: "Day 3 是長日，建議不要晚睡。"
  - day: "Day 3"
    date: "2027/11/19（五）"
    theme: "木津市場＋京都午餐＋甜點伴手禮＋寶可夢／動漫＋天ぷら 京星"
    items:
      - time: "07:30–08:00"
        plan: "飯店出發"
        status: "fixed"
        note: "Day 3 不吃飯店行政酒廊早餐。"
      - time: "08:00–09:30"
        plan: "木津市場早段輕食／早午餐"
        status: "fixed_pending_2027_calendar"
        note: "控制份量，避免影響中午京 鰻和 本店。"
      - time: "09:30–10:45"
        plan: "木津市場 → 京都站"
        status: "planning_baseline"
        note: "地鐵＋JR，或短程計程車到大阪站再搭 JR。"
      - time: "10:45–11:15"
        plan: "鶴屋吉信 IRODORI"
        status: "fixed_stop_pending_2027_hours"
        note: "京都站內，適合第一站購買甜點伴手禮。"
      - time: "11:30–13:00"
        plan: "午餐：京 鰻和 本店 / 京 うな和 本店"
        status: "fixed_meal_pending_reservation"
        note: "2027/11/19 營業、菜單、價格與取消政策需再次確認。"
      - time: "13:00–13:40"
        plan: "末富"
        status: "fixed_stop_pending_2027_hours"
        note: "四條烏丸周邊，午餐後順路。"
      - time: "13:40–14:40"
        plan: "Pokémon Center KYOTO"
        status: "fixed_stop_pending_2027_hours"
        note: "活動、限定商品與入場規則待確認。"
      - time: "14:40–15:50"
        plan: "京都國際漫畫博物館"
        status: "fixed_interest_pending_2027_calendar"
        note: "依體力安排停留；休館日與展覽待確認。"
      - time: "16:10–16:50"
        plan: "MALEBRANCHE 加加阿365祇園店"
        status: "fixed_stop_pending_2027_hours"
        note: "接祇園、花見小路、東山打卡。"
      - time: "16:50–17:40"
        plan: "祇園／東山拍照散步"
        status: "planning_baseline"
        note: "短程步行＋計程車，不排寺院收集。"
      - time: "18:00–19:30"
        plan: "晚餐：天ぷら 京星"
        status: "fixed_meal_pending_tableall_confirmation"
        note: "目前參考晚餐時段 18:00–19:30；主預約方式 TABLEALL Reservation Request。"
      - time: "19:30–21:00"
        plan: "京都 → 大阪飯店"
        status: "planning_baseline"
        note: "阪急／JR／計程車視體力；KKday #133661 包車僅為備案。"
      - time: "21:00 後"
        plan: "回飯店休息"
        status: "planning_baseline"
        note: "全程最長日。"
  - day: "Day 4"
    date: "2027/11/20（六）"
    theme: "Pokémon Center OSAKA DX＋精品購物＋行政酒廊下午茶"
    items:
      - time: "08:30–09:30"
        plan: "InterContinental Osaka 行政酒廊早餐"
        status: "pending_hotel_2027_policy"
        note: "早餐與 lounge access 需確認。"
      - time: "10:30–12:00"
        plan: "Pokémon Center OSAKA DX"
        status: "fixed_stop_pending_2027_hours"
        note: "2027/11/20 營業時間、活動、限定商品待確認。"
      - time: "12:00–13:30"
        plan: "午餐待確認"
        status: "candidate_needed"
        note: "建議心齋橋、難波或梅田附近。"
      - time: "13:30–15:00"
        plan: "精品購物／百貨"
        status: "planning_baseline"
        note: "心齋橋精品區、梅田百貨擇一或彈性安排。"
      - time: "15:00–16:30"
        plan: "InterContinental Osaka Executive Lounge 下午茶"
        status: "fixed_pending_hotel_2027_policy"
        note: "已排入 Day 4；實際時段、資格與內容待確認。"
      - time: "16:30–18:30"
        plan: "飯店休息／補逛梅田"
        status: "planning_baseline"
        note: "維持 Luxury Slow Travel，不塞滿。"
      - time: "19:00–20:30"
        plan: "晚餐待確認"
        status: "candidate_needed"
        note: "後續補大阪好吃優先餐廳候補。"
      - time: "20:30 後"
        plan: "整理戰利品與行李"
        status: "planning_baseline"
        note: "隔天退房返台。"
  - day: "Day 5"
    date: "2027/11/21（日）"
    theme: "退房、返回台灣"
    items:
      - time: "08:00–09:00"
        plan: "行政酒廊早餐或飯店早餐"
        status: "pending_hotel_2027_policy"
        note: "依 lounge policy 與退房節奏調整。"
      - time: "09:00–11:00"
        plan: "整理行李／退房前休息"
        status: "planning_baseline"
        note: "回程為晚班機，可保留從容退房。"
      - time: "11:00–13:30"
        plan: "午餐／梅田最後採買待確認"
        status: "candidate_needed"
        note: "不建議安排遠距離景點。"
      - time: "14:00–15:00"
        plan: "InterContinental Osaka → KIX"
        status: "selected_transport_pending_price"
        note: "使用 KKday #129909；接送時間依 BR129 18:30 起飛與機場報到時間倒推。"
      - time: "15:00–17:30"
        plan: "KIX 報到、託運、安檢、機場用餐或購物"
        status: "planning_baseline"
        note: "預留機場緩衝。"
      - time: "18:30–20:30"
        plan: "EVA Air BR129｜KIX → TPE"
        status: "use_current_timetable"
        note: "採用目前班表作為規劃基準；2027 官方班表仍需確認。"
