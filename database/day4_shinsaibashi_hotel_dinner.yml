metadata:
  id: day4_shinsaibashi_hotel_dinner
  title: "Day 4 心齋橋為主＋午餐後回飯店＋飯店內晚餐"
  version: "V5.21.0"
  status: "active_formal_day4_planning_baseline"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

user_confirmed_input:
  date_received: "2026-07-06"
  original_intent: "2027/11/20 活動範圍以心齋橋為主；午餐之後回飯店，在飯店附近活動；晚餐想在飯店內的餐廳使用。"
  interpretation:
    - "Day 4 上午與午餐前後以心齋橋／大丸心齋橋／Pokémon Center OSAKA DX 周邊為主。"
    - "午餐後不再安排遠距離景點，直接回 InterContinental Osaka。"
    - "下午以飯店行政酒廊下午茶、飯店休息、梅田／Grand Front Osaka 近距離散步或採買為主。"
    - "Day 4 晚餐地點固定為 InterContinental Osaka 飯店內餐廳；實際餐廳仍保留候選，待 2027 菜單、價格、訂位與體力狀況確認。"

formal_day4_route:
  date: "2027/11/20（六）"
  theme: "心齋橋 Pokémon Center OSAKA DX＋精品購物＋午餐後回飯店＋行政酒廊下午茶＋飯店內晚餐"
  planning_principle: "Luxury Slow Travel；上午集中在心齋橋，午餐後回飯店降低移動負擔。"
  items:
    - time: "08:30–09:30"
      plan: "InterContinental Osaka 行政酒廊早餐"
      status: "pending_hotel_2027_policy"
      note: "早餐與 lounge access 需確認。"
    - time: "10:00–12:00"
      plan: "心齋橋｜Pokémon Center OSAKA DX／大丸心齋橋周邊"
      status: "fixed_area_pending_2027_hours"
      note: "官方目前標示 Pokémon Center OSAKA DX 位於大丸心齋橋本館 9F，10:00–20:00；2027/11/20 營業時間、活動、限定商品與入場規則仍需再次確認。"
    - time: "12:00–13:15"
      plan: "心齋橋周邊午餐"
      status: "candidate_needed"
      note: "午餐仍待補候選；原則上選心齋橋／大丸心齋橋／難波北側，避免午餐後還要長距離移動。"
    - time: "13:15–14:00"
      plan: "心齋橋 → InterContinental Osaka"
      status: "fixed_direction"
      note: "午餐後回飯店。可搭 Osaka Metro 御堂筋線心齋橋站至梅田站，再步行／短程計程車到飯店；若購物多或疲勞，直接計程車。"
    - time: "14:00–15:00"
      plan: "飯店休息／整理購物品"
      status: "fixed_preference"
      note: "避免把 Day 4 排成整天外出；符合 Luxury Slow Travel。"
    - time: "15:00–16:30"
      plan: "InterContinental Osaka Executive Lounge 下午茶"
      status: "fixed_pending_hotel_2027_policy"
      note: "已正式排入 Day 4；實際時段、資格與內容待飯店 2027 政策確認。"
    - time: "16:30–18:30"
      plan: "飯店附近活動／梅田 Grand Front Osaka 周邊輕鬆散步"
      status: "fixed_area"
      note: "活動範圍限制在飯店附近，不再回心齋橋或安排遠距離景點。"
    - time: "19:00–20:30"
      plan: "InterContinental Osaka 飯店內餐廳晚餐"
      status: "fixed_location_restaurant_candidate_pending"
      note: "晚餐地點固定為飯店內；候選以 PIERRE 或 NOKA Roast & Grill 為主，依 2027 菜單、訂位、價格與當日體力決定。"
    - time: "20:30 後"
      plan: "整理戰利品與行李／休息"
      status: "planning_baseline"
      note: "隔天退房返台。"

