metadata:
  id: day4_shinsaibashi_hotel_dinner
  title: "Day 4 心齋橋為主＋午餐後回飯店＋NOKA Roast & Grill"
  version: "V5.23.0"
  status: "active_formal_day4_planning_baseline_with_noka"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

user_confirmed_input:
  date_received: "2026-07-06"
  previous_dinner_intent_v5_22: "晚餐想要吃壽司。"
  new_dinner_intent_v5_23: "NOKA Roast & Grill。"
  interpretation:
    - "Day 4 上午與午餐前後仍以心齋橋／大丸心齋橋／Pokémon Center OSAKA DX 周邊為主。"
    - "午餐後仍維持回 InterContinental Osaka，下午只在飯店或飯店附近活動。"
    - "Day 4 晚餐正式方向改為 InterContinental Osaka 館內 NOKA Roast & Grill。"
    - "套餐包含開胃菜自助餐、主菜（選）、甜點自助餐與咖啡或茶；飲品為 90 分鐘暢飲。"
    - "特價菜單日不適用，預約前需確認當日是否為特價菜單日。"
    - "V5.22.0 壽司晚餐偏好降為備案，不再作為 Day 4 主晚餐方向。"

conflict_resolution:
  issue: "壽司晚餐 vs NOKA Roast & Grill"
  decision: "NOKA Roast & Grill 優先。"
  reason: "使用者明確指定改為 NOKA Roast & Grill，並提供每人 JPY 17,500 + 10% 的套餐資訊。"
  impact: "Day 4 晚餐不再需要優先搜尋壽司或 PIERRE 候選；壽司與 PIERRE 僅保留為使用者再次改回時的備案。"
  status: "RESOLVED_BY_USER_CONFIRMATION"

formal_day4_route:
  date: "2027/11/20（六）"
  theme: "心齋橋 Pokémon Center OSAKA DX＋精品購物＋午餐後回飯店＋行政酒廊下午茶＋NOKA Roast & Grill"
  planning_principle: "Luxury Slow Travel；上午集中在心齋橋，午餐後回飯店降低移動負擔；晚餐在館內 NOKA 做紀念日晚餐。"
  items:
    - time: "08:30–09:30"
      plan: "InterContinental Osaka 行政酒廊早餐"
      status: "pending_hotel_2027_policy"
      note: "早餐與 lounge access 需確認。"
    - time: "10:00–12:00"
      plan: "心齋橋｜Pokémon Center OSAKA DX／大丸心齋橋周邊"
      status: "fixed_area_pending_2027_hours"
      note: "官方目前標示 Pokémon Center OSAKA DX 位於大丸心齋橋本館 9F，10:00–20:00；2027/11/20 營業時間、活動、限定商品與入場規則仍需再次確認。"
    - time: "12:00–13:15"
      plan: "心齋橋周邊午餐"
      status: "candidate_needed"
      note: "午餐仍待補候選；原則上選心齋橋／大丸心齋橋／難波北側，避免午餐後還要長距離移動。"
    - time: "13:15–14:00"
      plan: "心齋橋 → InterContinental Osaka"
      status: "fixed_direction"
      note: "午餐後回飯店。預計刷西瓜卡搭 Osaka Metro 御堂筋線心齋橋站至梅田站，再步行到飯店；若購物多或疲勞，保留計程車備援。"
    - time: "14:00–15:00"
      plan: "飯店休息／整理購物品"
      status: "fixed_preference"
      note: "避免把 Day 4 排成整天外出；符合 Luxury Slow Travel。"
    - time: "15:00–16:30"
      plan: "InterContinental Osaka Executive Lounge 下午茶"
      status: "fixed_pending_hotel_2027_policy"
      note: "已正式排入 Day 4；實際時段、資格與內容待飯店 2027 政策確認。"
    - time: "16:30–18:30"
      plan: "飯店附近活動／梅田 Grand Front Osaka 周邊輕鬆散步"
      status: "fixed_area"
      note: "活動範圍限制在飯店附近，不再回心齋橋或安排遠距離景點。"
    - time: "19:00–20:30"
      plan: "NOKA Roast & Grill 晚餐"
      status: "formal_dinner_direction_pending_2027_reservation"
      note: "預約時請確認套餐內容、主菜選擇、飲品與特價菜單日是否適用。"
    - time: "20:30 後"
      plan: "回飯店整理戰利品與行李／休息"
      status: "planning_baseline"
      note: "隔天退房返台。"

  noka_roast_grill:
    date: "2027/11/20（六）"
    restaurant_japanese: "ノカ ロースト & グリル"
    restaurant_english: "NOKA Roast & Grill"
    location: "InterContinental Osaka"
    role: "Day 4 formal dinner"
    priority: "PRIMARY_FORMAL_DINNER"
    requested_seat: "As available"
    requested_experience: "Dinner with buffet package and drinks"
    reference_price_jpy_per_person: 17500
    service_charge_percent: 10
    reference_price_jpy_total_for_two: 38500
    reference_price_note: "每人 JPY 17,500，另加 10%；兩人合計 JPY 38,500。套餐包含開胃菜自助餐、主菜（選）、甜點自助餐與咖啡或茶，飲品 90 分鐘暢飲；特價菜單日不適用。"
    reservation_note:
      - "確認套餐內容、主菜選擇、甜點自助餐與 90 分鐘暢飲。"
      - "確認是否屬於特價菜單日，以及不適用條件。"
      - "如有需要，可同步詢問是否能安排窗邊座位或其他用餐備註。"
  reservation_status: "PENDING_2027_BOOKING_WINDOW"
  menu_status: "PENDING_2027_MENU"
  price_status: "NEEDS_RECONFIRMATION"
  cancellation_policy_status: "NEEDS_RECONFIRMATION"

reservation_message_draft:
  english: >-
    We would like to reserve dinner at NOKA Roast & Grill. If possible, please note our buffet package and 90-minute drinks request. If there are any special dining notes or seating preferences we should include, we would be happy to know.

fallbacks:
  sushi:
    role: "備案"
    status: "FALLBACK_ONLY"
    note: "V5.22.0 曾記錄壽司晚餐偏好；V5.23.0 已由使用者改為 NOKA Roast & Grill。除非使用者再次改回壽司，否則不作主方案。"
  pierre:
    restaurant_japanese: "フレンチレストラン ピエール"
    restaurant_english: "PIERRE"
    role: "館內非主方案備案"
    status: "FALLBACK_ONLY"
    note: "若 NOKA 無法預約或套餐／飲品條件不符合需求，可再比較 PIERRE，但不作目前主方案。Pierre 位於洲際 20 樓，連續 10 年榮獲米其林一星；需 Smart Casual，且不接待 12 歲以下孩童。"
  adee:
    restaurant_japanese: "アディ ラウンジ＆バー"
    restaurant_english: "ADEE Lounge & Bar"
    role: "飯後飲料／Nightcap 候選，不作主晚餐"
    status: "OPTIONAL_NIGHTCAP_ONLY"
    note: "如晚餐後仍想喝飲料，可作飯後選項。"

watch_items:
    - "Pokémon Center OSAKA DX 2027/11/20 business hours, entry restrictions, event / campaign, limited goods."
    - "心齋橋午餐候選：需補好吃優先、回飯店動線順的餐廳。"
    - "Day 4 午餐後回飯店交通：御堂筋線 vs taxi, depending on purchases and fatigue."
    - "InterContinental Osaka Executive Lounge 2027 Day 4 afternoon tea hours and eligibility."
    - "NOKA Roast & Grill 2027/11/20 dinner booking window, menu, price, service charge, drinks inclusion, special menu day rules, cancellation policy, and request handling."
    - "Sushi is retained only as fallback if the user changes back."

