    - "Day 4 NOKA 雙人 JPY 38,500 以匯率 0.2 換算後，主預算由 TWD 244,646 調整為 TWD 213,846。"
    - "USJ 票券價格確認為單人報價，需以兩人計算後再加上園區餐飲與購物，主預算由 TWD 213,846 調整為 TWD 222,400。"
