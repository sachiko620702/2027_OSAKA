metadata:
  id: hotel_lounge
  title: "InterContinental Osaka 行政酒廊規劃"
  version: "V5.20.0"
  status: "active_planning_baseline_with_hotel_reply"
  last_updated: "2026-07-07"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

hotel:
  name: "InterContinental Osaka"
  role: "正式住宿"
  trip_dates: "2027/11/17（三）～2027/11/21（日）"

lounge_policy:
  breakfast_principle: "平常早餐以飯店行政酒廊為主；Day 3 木津市場日例外，不吃飯店早餐。"
  afternoon_tea_principle: "Day 1 抵達後希望使用行政酒廊下午茶；Day 4 也已正式安排行政酒廊下午茶，且 Day 4 午餐後會回飯店並在飯店附近活動。"
  confirmation_status: "PARTIALLY_CONFIRMED_BY_HOTEL_REPLY"
  caveat: "飯店已回覆預訂開放時間、房型升等與 12:00 提早入住可付費保證的方向；2027 行政酒廊開放時段、入住日是否可於正式入住前使用、同行者資格與餐飲內容仍需向飯店再次確認。"

hotel_reply:
  received_date: "2026-07-07"
  reply_status: "PARTIALLY_CONFIRMED"
  reservation_open_timing: "通常約入住前 10 個月開放；2027/11 預訂可先於 2027/02 左右留意。"
  planned_room_type:
    requested: "1 King Premium Club Lounge Access"
    usual_upgrade: "1 King Junior Suite with club lounge access"
    note: "飯店表示通常會升等到 Junior Suite with club lounge access，但仍以當下房況為準。"
  consecutive_reservations:
    same_room_policy: "若兩筆連住訂的是同房型，飯店會盡量安排同一間房。"
    lounge_access_policy: "若兩筆連住都訂含 Club Lounge Access 的房型，入住期間可持續使用 Club Lounge。"
    f_and_b_credit_policy: "兩筆連住的 Food & Beverage credit 只會提供一次。"
  early_check_in:
    target_time: "12:00"
    policy: "可視當天房況協助安排；若要保證，可在訂房後詢問付費提早入住方案，但實際加價需完成訂房後才能確認。"

planned_lounge_uses:
  - date: "2027/11/17（三）"
    day: "Day 1"
    purpose: "抵達日行政酒廊下午茶"
    planning_time: "15:00–16:00"
    status: "preferred_target_pending_hotel_policy"
    note: "使用者希望第一天用到下午茶。依 BR178 10:10 抵達與 Hello Kitty HARUKA 暫排，若 13:30–14:30 抵達飯店且 lounge access 可用，優先安排行政酒廊下午茶；下午茶後先在飯店休息，再去梅田 Pokémon Center OSAKA，並在 Pokémon Center 附近吃晚餐後回飯店。"
  - date: "2027/11/20（六）"
    day: "Day 4"
    purpose: "行政酒廊下午茶"
    planning_time: "15:00–16:30"
    status: "fixed_pending_hotel_policy"
    note: "已正式排入 Day 4；Day 4 上午以心齋橋／Pokémon Center OSAKA DX 為主，午餐後回 InterContinental Osaka，下午茶後只安排飯店附近活動，晚餐固定在飯店內餐廳。需確認 2027 實際時段、資格與內容。"

day1_sequence:
  - "BR178 抵達 KIX"
  - "Hello Kitty HARUKA 前往 InterContinental Osaka"
  - "寄放行李／辦理入住／短暫整理"
  - "行政酒廊下午茶"
  - "飯店休息一下"
  - "梅田 Pokémon Center OSAKA"
  - "Pokémon Center 附近晚餐"
  - "回 InterContinental Osaka 休息"

day4_sequence:
  - "InterContinental Osaka 行政酒廊早餐"
  - "心齋橋／大丸心齋橋／Pokémon Center OSAKA DX"
  - "心齋橋周邊午餐"
  - "午餐後回 InterContinental Osaka"
  - "飯店休息／整理購物品"
  - "InterContinental Osaka Executive Lounge 下午茶"
  - "飯店附近活動／Grand Front Osaka 周邊"
  - "InterContinental Osaka 飯店內餐廳晚餐"
  - "整理戰利品與行李"

fallbacks:
  day1_if_not_available:
    - "若抵達飯店時尚未能使用行政酒廊，先寄放行李並在飯店休息。"
    - "若下午茶時段錯過，Day 1 保留梅田輕食／咖啡作備案。"
    - "若抵達日太累，可縮短 Pokémon Center 停留時間，晚餐仍以附近簡單用餐為主。"
    - "Day 4 行政酒廊下午茶仍保留為正式安排。"
  day4_if_lounge_not_available:
    - "若 Day 4 行政酒廊下午茶不可用，改以飯店內 3-60 或附近 Grand Front Osaka 咖啡休息作備案。"
    - "晚餐仍維持飯店內餐廳方向，避免下午回飯店後再外出。"

watch_items:
  - "InterContinental Osaka 2027 Executive Lounge afternoon tea hours."
  - "Arrival-day lounge access before / at check-in."
  - "Room type and lounge benefit eligibility."
  - "Guest policy for two travelers."
  - "Afternoon tea food and beverage offering."
  - "Whether Day 1 arrival time can realistically connect to afternoon tea after KIX transfer."
  - "Dinner candidates near Pokémon Center OSAKA in Umeda."
  - "Day 4 Executive Lounge afternoon tea hours and eligibility after returning from Shinsaibashi."
  - "Day 4 hotel dinner candidate: NOKA Roast & Grill reservation availability, menu, price, service charge and cancellation policy."
