    reminder: "確認 2027/11 Studio Pass 價格、入園規則、平台庫存與取消政策；也需確認 USJ VIP 5 小時是否已包含 Studio Pass。"
  - item: "2027/11/05 旅遊保險"
    suggested_time: "2027/11/05"
    status: "已排程"
    reminder: "金額 TWD 6,900；確認投保內容、醫療保障、旅遊不便險、保單文件與付款狀態。"
  - item: "2027/11/05 申請漫遊"
    suggested_time: "2027/11/05"
    status: "已排程"
    reminder: "金額 TWD 499；確認電信商方案、啟用時間、計費方式、熱點分享與付款狀態。"

