    reminder: "對應 KKday #129909，確認飯店 ↔ KIX 日期、車型、行李限制、等待時間與取消政策；KIX→飯店改搭 Hello Kitty HARUKA。"
  - item: "2027/10/10 買 USJ Studio Pass"
