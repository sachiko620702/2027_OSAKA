trip_overview:
  destination: "大阪"
  dates: "2027/11/17（三）～2027/11/21（日）"
  duration: "五天四夜"
  travelers: 2
  hotel: "InterContinental Osaka"
  planned_room_type: "1 King Premium Club Lounge Access（預計升等為 1 King Junior Suite with club lounge access）"
  style: "Luxury Slow Travel"
  flight_baseline: "去程 EVA Air BR178 暫採現行班表 06:30 TPE → 10:10 KIX；回程 EVA Air BR129 暫採現行班表 18:30 KIX → 20:30 TPE。2027/11 官方班表、票價與訂位狀態仍需確認。"
  budget_baseline: "V5.57.0 建議版主預算 NT$242,070／兩人；節制版 NT$237,372／兩人；安全版 NT$280,000／兩人；硬上限 NT$280,000／兩人；Ambassador 續約 USD 250 與精品購物另計。USJ Express Pass 7 已改為 USJ VIP 5 小時，暫以 TWD 60,000 估算；VIP 方案目前僅視為包含晚餐，午餐與園內餐飲另行確認；KIX→飯店改為 Hello Kitty HARUKA，約 NT$800；飯店→KIX 仍先以 KKday #129909 參考；USJ 去程保留大阪環狀線 + JR 夢咲線，回程改為包車約 NT$1,800；USJ 周邊購物與普通購物合併為 NT$14,000。"
  confirmed_scope:
    - "USJ 一天，V5.57.0 改採 USJ VIP 5 小時，不再使用 Express Pass 7 作為主方案"
    - "好吃優先餐飲"
    - "精品購物另計"
    - "Day 1 正式確認：行政酒廊下午茶、飯店休息、梅田 Pokémon Center OSAKA、千房梅田周邊店晚餐、回飯店"
    - "Day 1 晚餐正式方向：千房 梅田周邊店；實際分店、訂位、價格與營業時間待確認"
    - "Day 3 正式覆蓋：不去京都；木津市場早午餐＋難波／日本橋動漫模型周邊＋回飯店休息與行政酒廊下午茶＋肉NOASATSU 壽司晚餐"
    - "Day 3 京都版、京 鰻和 本店與天ぷら 京星降為備案／歷史版本"
    - "Day 4 正式確認：心齋橋為主；Pokémon Center OSAKA DX；午餐後回 InterContinental Osaka；下午在飯店附近活動；NOKA Roast & Grill"
    - "Day 4 PIERRE 與壽司皆為 fallback-only，不是目前正式晚餐"
    - "V5.57.0 將主控預算更新到 NT$242,070／兩人。"

hotel_reply_summary:
  received_date: "2026-07-07"
  faq:
    reservation_open: "2027 年 11 月的訂房通常會在入住前約 10 個月開放，建議 2027/02 左右留意官網。"
    room_upgrade: "若預訂 1 King Premium Club Lounge Access，通常會升等為 1 King Junior Suite with club lounge access。"
    consecutive_reservations: "兩筆同房型連住可盡量安排同一間房；若兩筆都訂含 Club Lounge Access 的房型，入住期間可持續使用 Club Lounge。"
    f_and_b_credit: "兩筆連住的 Food & Beverage credit 只會提供一次。"
  hotel_policy_memo:
    room_type_note: "預計房型為 1 King Premium Club Lounge Access；飯店回信表示通常可升等到 Junior Suite with club lounge access，但仍視房況而定。"
    early_check_in: "12:00 提早入住可視當天房況安排；若要保證，可在訂房後詢問付費方案與實際加價。"
    lounge_access: "只要訂的是含 Club Lounge Access 的房型，入住期間即可使用 Club Lounge。"
  pre_trip_to_confirm:
    - "確認 2027/02 左右開放後的實際可訂房型與價格。"
    - "若拆成兩筆連住訂單，確認兩筆都維持同房型與 Club Lounge Access。"
    - "確認 12:00 提早入住的加價方案、計費方式與預訂條件。"
    - "確認續約 Ambassador 後是否仍適用預期的升等與 Club Lounge 使用方式。"

itinerary_table:
  - date: "Day 1｜2027/11/17（三）"
    focus: "抵達大阪、行政酒廊下午茶、飯店休息、梅田 Pokémon Center、千房晚餐"
    main_places: "台北桃園機場、關西機場、InterContinental Osaka、梅田、Pokémon Center OSAKA、千房梅田周邊店"
    transportation: "EVA Air BR178 06:30–10:10；Hello Kitty HARUKA 至飯店；梅田步行／計程車"
    meals: "行政酒廊下午茶；晚餐：千房 梅田周邊店"
    notes: "千房已由候補升級為 Day 1 正式晚餐方向；實際梅田周邊分店、訂位、營業時間、價格與從 Pokémon Center OSAKA 的動線仍需確認。"
  - date: "Day 2｜2027/11/18（四）"
    focus: "USJ 一日遊，改採 USJ VIP 5 小時"
    main_places: "Universal Studios Japan"
    transportation: "去程大阪環狀線 + JR 夢咲線；回程包車；去程約 JPY 400／程"
    meals: "行政酒廊早餐；USJ VIP 5 小時目前僅視為包含晚餐"
    notes: "V5.57.0 將 Express Pass 7 改為 USJ VIP 5 小時，暫以 TWD 60,000 估算；USJ 去程改採大阪環狀線 + JR 夢咲線、回程改為包車。需確認 VIP 是否含 Studio Pass，以及午餐與園內餐飲是否另計。"
  - date: "Day 3｜2027/11/19（五）"
    focus: "木津市場、日本橋動漫模型、飯店酒廊下午茶、肉NOASATSU 壽司晚餐"
    main_places: "木津市場、難波、日本橋、Den Den Town、Ota Road、InterContinental Osaka Executive Lounge、肉NOASATSU"
    transportation: "大阪市內地鐵（預計刷西瓜卡）、步行；保留少量短程計程車備援；不去京都；KKday #133661 不再作為 Day 3 主方案"
    meals: "木津市場早午餐；難波／道頓堀／心齋橋午餐待選；行政酒廊下午茶；晚餐：肉NOASATSU"
    notes: "正式行程已覆蓋為大阪市內版。京都版、京 鰻和 本店、天ぷら 京星降為備案；Day 3 壽司晚餐正式店名為肉NOASATSU，來源為 KKday #268366，單人 NT$1,541、兩人 NT$3,082，取消政策與交通待確認。"
  - date: "Day 4｜2027/11/20（六）"
    focus: "心齋橋 Pokémon Center、精品購物、午餐後回飯店、行政酒廊下午茶、NOKA Roast & Grill"
    main_places: "心齋橋、大丸心齋橋、Pokémon Center OSAKA DX、InterContinental Osaka Executive Lounge、Grand Front Osaka、NOKA Roast & Grill"
    transportation: "上午到心齋橋；午餐後以西瓜卡搭地鐵回 InterContinental Osaka；下午只在飯店或飯店附近活動；晚餐在飯店內 NOKA"
    meals: "行政酒廊早餐；心齋橋周邊午餐待確認；行政酒廊下午茶；晚餐：NOKA Roast & Grill"
    notes: "NOKA 是目前正式 Day 4 晚餐。PIERRE 與壽司為備案。訂位時備註 anniversary dinner，並請求 buffet package 與 90 分鐘暢飲；座位不保證。"
  - date: "Day 5｜2027/11/21（日）"
    focus: "退房、返回台灣"
    main_places: "InterContinental Osaka、關西機場、台北桃園機場"
    transportation: "KKday #129909 飯店接送至 KIX；V5.24.0 暫估單程 NT$2,600；EVA Air BR129 18:30–20:30"
    meals: "行政酒廊早餐或機場用餐待確認"
    notes: "BR129 先採現行班表暫排；回程為晚班機，可保留上午整理與最後採買時間。2027 官方航班與接送時間仍需確認。"

