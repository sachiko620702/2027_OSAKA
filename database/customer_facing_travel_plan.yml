trip_overview:
  destination: "大阪"
  dates: "2027/11/17（三）～2027/11/21（日）"
  duration: "五天四夜"
  travelers: 2
  hotel: "InterContinental Osaka"
  style: "Luxury Slow Travel"
  flight_baseline: "去程 EVA Air BR178 暫採現行班表 06:30 TPE → 10:10 KIX；回程 EVA Air BR129 暫採現行班表 18:30 KIX → 20:30 TPE。2027/11 官方班表、票價與訂位狀態仍需確認。"
  confirmed_scope:
    - "USJ 一天"
    - "好吃優先餐飲"
    - "精品購物"
    - "Day 1 正式確認：行政酒廊下午茶、飯店休息、梅田 Pokémon Center OSAKA、千房梅田周邊店晚餐、回飯店"
    - "Day 1 晚餐正式方向：千房 梅田周邊店；實際分店、訂位、價格與營業時間待確認"
    - "Day 3 正式確認：木津市場＋京都甜點伴手禮＋寶可夢／動漫＋京 鰻和 本店午餐＋天ぷら 京星晚餐"
    - "Day 4 正式確認：心齋橋為主；Pokémon Center OSAKA DX；午餐後回 InterContinental Osaka；下午在飯店附近活動；晚餐偏好壽司"
    - "Day 4 壽司晚餐注意：InterContinental Osaka 官方 FAQ 目前寫明館內沒有和食餐廳，因此需補飯店附近／梅田／大阪站周邊壽司候選；PIERRE / NOKA 僅作非壽司備案"

itinerary_table:
  - date: "Day 1｜2027/11/17（三）"
    focus: "抵達大阪、行政酒廊下午茶、飯店休息、梅田 Pokémon Center、千房晚餐"
    main_places: "台北桃園機場、關西機場、InterContinental Osaka、梅田、Pokémon Center OSAKA、千房梅田周邊店"
    transportation: "EVA Air BR178 06:30–10:10；KKday #129909 機場接送至飯店；梅田步行／計程車"
    meals: "行政酒廊下午茶；晚餐：千房 梅田周邊店"
    notes: "千房已由候補升級為 Day 1 正式晚餐方向；實際梅田周邊分店、訂位、營業時間、價格與從 Pokémon Center OSAKA 的動線仍需確認。"
  - date: "Day 2｜2027/11/18（四）"
    focus: "USJ 一日遊"
    main_places: "Universal Studios Japan"
    transportation: "KKday #536220 飯店 ↔ USJ 來回接送"
    meals: "行政酒廊早餐；園區內用餐待確認"
    notes: "USJ 門票與活動待官方公布。"
  - date: "Day 3｜2027/11/19（五）"
    focus: "木津市場、京都午餐、甜點伴手禮、寶可夢／動漫、京都晚餐"
    main_places: "木津市場、京 鰻和 本店、鶴屋吉信 IRODORI、末富、Pokémon Center KYOTO、京都國際漫畫博物館、MALEBRANCHE 加加阿365祇園店、祇園、天ぷら 京星"
    transportation: "木津市場後前往京都站：地鐵＋JR，或短程計程車到大阪站再搭 JR；京都市內用地鐵＋短程計程車；KKday #133661 僅作備案"
    meals: "木津市場早段輕食／早午餐；午餐：京 鰻和 本店；京都甜點伴手禮；晚餐：天ぷら 京星"
    notes: "正式行程已確認。Day 3 不吃飯店行政酒廊早餐。"
  - date: "Day 4｜2027/11/20（六）"
    focus: "心齋橋 Pokémon Center、精品購物、午餐後回飯店、行政酒廊下午茶、壽司晚餐"
    main_places: "心齋橋、大丸心齋橋、Pokémon Center OSAKA DX、InterContinental Osaka Executive Lounge、Grand Front Osaka、飯店附近／梅田壽司候選"
    transportation: "上午到心齋橋；午餐後回 InterContinental Osaka；下午只在飯店或飯店附近活動；晚餐依壽司候選位置短程移動"
    meals: "行政酒廊早餐；心齋橋周邊午餐待確認；行政酒廊下午茶；壽司晚餐候選待補"
    notes: "使用者新增偏好：晚餐想吃壽司。因飯店目前沒有和食餐廳，壽司晚餐需找飯店附近／梅田／大阪站周邊候選；若最後仍堅持飯店內，PIERRE / NOKA 僅作非壽司備案。"
  - date: "Day 5｜2027/11/21（日）"
    focus: "退房、返回台灣"
    main_places: "InterContinental Osaka、關西機場、台北桃園機場"
    transportation: "KKday #129909 飯店接送至 KIX；EVA Air BR129 18:30–20:30"
    meals: "行政酒廊早餐或機場用餐待確認"
    notes: "BR129 先採現行班表暫排；回程為晚班機，可保留上午整理與最後採買時間。2027 官方航班與接送時間仍需確認。"

