trip_overview:
  destination: "大阪"
  dates: "2027/11/17（三）～2027/11/21（日）"
  duration: "五天四夜"
  travelers: 2
  hotel: "InterContinental Osaka"
  style: "Luxury Slow Travel"
  flight_baseline: "去程 EVA Air BR178 暫採現行班表 06:30 TPE → 10:10 KIX；回程 EVA Air BR129 暫採現行班表 18:30 KIX → 20:30 TPE。2027/11 官方班表、票價與訂位狀態仍需確認。"
  budget_baseline: "V5.26.1 建議版主預算 NT$295,664／兩人；安全上限 NT$380,000／兩人；Ambassador 續約 USD 250 與精品購物另計。"
  confirmed_scope:
    - "USJ 一天"
    - "好吃優先餐飲"
    - "精品購物"
    - "Day 1 正式確認：行政酒廊下午茶、飯店休息、梅田 Pokémon Center OSAKA、千房梅田周邊店晚餐、回飯店"
    - "Day 1 晚餐正式方向：千房 梅田周邊店；實際分店、訂位、價格與營業時間待確認"
    - "Day 3 正式覆蓋：不去京都；木津市場早午餐＋難波／日本橋動漫模型周邊＋回飯店休息與行政酒廊下午茶＋大阪市內壽司晚餐"
    - "Day 3 京都版、京 鰻和 本店與天ぷら 京星降為備案／歷史版本"
    - "Day 4 正式確認：心齋橋為主；Pokémon Center OSAKA DX；午餐後回 InterContinental Osaka；下午在飯店附近活動；PIERRE Anniversary Dinner"
    - "V5.26.1 將 KKday #536220 飯店 ↔ USJ 接送補入 2027/10/10 購買批次"
    - "機票預算為 TWD 36,000；建議版主預算為 TWD 295,664／兩人。"

itinerary_table:
  - date: "Day 1｜2027/11/17（三）"
    focus: "抵達大阪、行政酒廊下午茶、飯店休息、梅田 Pokémon Center、千房晚餐"
    main_places: "台北桃園機場、關西機場、InterContinental Osaka、梅田、Pokémon Center OSAKA、千房梅田周邊店"
    transportation: "EVA Air BR178 06:30–10:10；KKday #129909 機場接送至飯店；梅田步行／計程車"
    meals: "行政酒廊下午茶；晚餐：千房 梅田周邊店"
    notes: "千房已由候補升級為 Day 1 正式晚餐方向；實際梅田周邊分店、訂位、營業時間、價格與從 Pokémon Center OSAKA 的動線仍需確認。"
  - date: "Day 2｜2027/11/18（四）"
    focus: "USJ 一日遊"
    main_places: "Universal Studios Japan"
    transportation: "KKday #536220 飯店 ↔ USJ 來回接送；V5.24.0 暫估單程 NT$1,732、來回 NT$3,464"
    meals: "行政酒廊早餐；園區內用餐待確認"
    notes: "V5.26.1 時間軸設定 2027/09/17 搶購 Express Pass 7，2027/10/10 買 Studio Pass 與 KKday #536220 飯店 ↔ USJ 接送。"
  - date: "Day 3｜2027/11/19（五）"
    focus: "木津市場、日本橋動漫模型、飯店酒廊下午茶、大阪市內壽司晚餐"
    main_places: "木津市場、難波、日本橋、Den Den Town、Ota Road、InterContinental Osaka Executive Lounge、大阪市內壽司餐廳待選"
    transportation: "大阪市內地鐵、步行、短程計程車；不去京都；KKday #133661 不再作為 Day 3 主方案"
    meals: "木津市場早午餐；難波／道頓堀／心齋橋午餐待選；行政酒廊下午茶；晚餐：大阪市內壽司"
    notes: "正式行程已覆蓋為大阪市內版。京都版、京 鰻和 本店、天ぷら 京星降為備案。"
  - date: "Day 4｜2027/11/20（六）"
    focus: "心齋橋 Pokémon Center、精品購物、午餐後回飯店、行政酒廊下午茶、PIERRE Anniversary Dinner"
    main_places: "心齋橋、大丸心齋橋、Pokémon Center OSAKA DX、InterContinental Osaka Executive Lounge、Grand Front Osaka、PIERRE"
    transportation: "上午到心齋橋；午餐後回 InterContinental Osaka；下午只在飯店或飯店附近活動；晚餐在飯店內 PIERRE"
    meals: "行政酒廊早餐；心齋橋周邊午餐待確認；行政酒廊下午茶；晚餐：PIERRE Anniversary Dinner"
    notes: "V5.26.1 時間軸設定 2027/09/17 處理 PIERRE 訂位；預約時需備註紀念日晚餐，並請求靠窗座位／大阪夜景座位；座位安排不保證。"
  - date: "Day 5｜2027/11/21（日）"
    focus: "退房、返回台灣"
    main_places: "InterContinental Osaka、關西機場、台北桃園機場"
    transportation: "KKday #129909 飯店接送至 KIX；V5.24.0 暫估單程 NT$2,600；EVA Air BR129 18:30–20:30"
    meals: "行政酒廊早餐或機場用餐待確認"
    notes: "BR129 先採現行班表暫排；回程為晚班機，可保留上午整理與最後採買時間。2027 官方航班與接送時間仍需確認。"

todo_table:
  - item: "2026/11 買機票：EVA Air BR178／BR129"
    suggested_time: "2026/11"
    status: "已排程"
    reminder: "機票預算為 TWD 36,000／兩人；2027/11 官方班表、票價、機型、航廈、行李與訂位狀態仍需確認。"
  - item: "2026/12 續約洲際酒店大使 Ambassador"
    suggested_time: "2026/12"
    status: "已排程，USD 獨立追蹤"
    reminder: "金額 USD 250；未指定匯率前不硬轉 TWD，不併入 TWD 主預算。需確認 BOGO、房型升等與會員禮遇。"
  - item: "2027/09/17 搶購 USJ Express Pass 7"
    suggested_time: "2027/09/17"
    status: "已排程，待官方公布"
    reminder: "實際開賣日、價格、設施內容、Super Nintendo World / Donkey Kong Country 規則需依官方公布。"
  - item: "2027/09/17 PIERRE Anniversary Dinner 訂位"
    suggested_time: "2027/09/17"
    status: "已排程，待訂位窗口"
    reminder: "訂位時備註 anniversary dinner，請求 window table / Osaka night view，並詢問紀念日甜點訊息或小驚喜；座位不保證。"
  - item: "2027/10/10 買 KKday 機場接送"
    suggested_time: "2027/10/10"
    status: "已排程，價格待確認"
    reminder: "對應 KKday #129909，確認 KIX ↔ InterContinental Osaka 日期、車型、行李限制、等待時間與取消政策。"
  - item: "2027/10/10 買 KKday USJ 接送"
    suggested_time: "2027/10/10"
    status: "已排程，價格待確認"
    reminder: "對應 KKday #536220；V5.24.0 參考來回 TWD 3,464，需確認 2027 日期、路線、車型、20KM 範圍、pickup point、行李與取消規則。"
  - item: "2027/10/10 買 USJ Studio Pass"
    suggested_time: "2027/10/10"
    status: "已排程，待官方公布"
    reminder: "確認 2027/11 Studio Pass 價格、入園規則、平台庫存與取消政策。"
  - item: "2027/11/05 旅遊保險"
    suggested_time: "2027/11/05"
    status: "已排程"
    reminder: "金額 TWD 6,900；確認投保內容、旅遊不便險、醫療保障、保單文件與付款狀態。"
  - item: "2027/11/05 申請漫遊"
    suggested_time: "2027/11/05"
    status: "已排程"
    reminder: "金額 TWD 499；確認電信商方案、啟用時間、計費方式、熱點分享與付款狀態。"

